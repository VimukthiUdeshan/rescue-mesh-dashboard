<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png"/>
<title>Flood Rescue Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f7fc;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
}

h2 {
    font-weight: 900; /* extra bold */
    font-size: 2.5rem; /* bigger size */
    color: #2575fc;
}

h4 {
    color: #2575fc;
}

/* Change link's color on hover */
.table-link:hover {
    color: #ff5733 !important; 
    text-decoration: underline; /* Adds an underline */
    transition: 0.3s; /* Makes the color change smooth */
}

#map {
    width: 100%;
    height: 600px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}


.row .col-md-4:nth-child(1) h5 {
    color: #FF5733; 
    font-weight: 600;
}


.row .col-md-4:nth-child(2) h5 {
    color: #28a745;
    font-weight: 600;
}


.row .col-md-4:nth-child(3) h5 {
    color: #FFC107; 
    font-weight: 600;
}

.row .col-md-4:nth-child(1) h3 {
    color: #FF5733; 
    font-weight: 600;
}

.row .col-md-4:nth-child(2) h3 {
    color: #28a745;
    font-weight: 600;
}


.row .col-md-4:nth-child(3) h3 {
    color: #FFC107; 
    font-weight: 600;
}


.card {
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    background: #fff;
}

.table-responsive {
    max-height: 600px;
    overflow-y: auto;
    border-radius: 12px;
}

.table thead {
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    color: #fff;
    font-weight: 600;
}

.table tbody tr:hover {
    background-color: rgba(37, 117, 252, 0.1);
}

.form-check-input {
    transform: scale(1.2);
}

.form-select, .form-control {
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.form-select:focus, .form-control:focus {
    box-shadow: 0 0 5px rgba(37,117,252,0.5);
    border-color: #2575fc;
}
</style>
</head>

<body>

<div class="container-fluid mt-4">
  <!-- Header -->
  <div class="row mb-4">
    <div class="col-12 text-center">
      <h2>Rescue Mesh – SOS Dashboard</h2>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="row mb-4">
    <div class="col-md-4 mb-2">
      <div class="card text-center p-3">
        <h5>Total SOS</h5>
        <h3 id="totalSOS">0</h3>
      </div>
    </div>
    <div class="col-md-4 mb-2">
      <div class="card text-center p-3">
        <h5>Handled</h5>
        <h3 id="handledSOS">0</h3>
      </div>
    </div>
    <div class="col-md-4 mb-2">
      <div class="card text-center p-3">
        <h5>Pending</h5>
        <h3 id="pendingSOS">0</h3>
      </div>
    </div>
  </div>

  <!-- Map + Table Side by Side -->
  <div class="row">
    <div class="col-lg-6 mb-4">
    <h4 class="text-center mb-3">Live Emergency Map View</h4>
    <!-- Map -->
      <div id="map"></div>
    </div>

    <!-- Table -->
    <div class="col-lg-6">
      <h4 class="text-center mb-3">Data Collection Table 
            <a href="view_Full_Table.html" target="_blank" class="table-link" style="text-decoration: none; font-size: 1rem; color: #0d026b; font-weight: bold;">
            (Table Full View ↗) </a>
      </h4>
              
      <div class="table-responsive">
        <table class="table table-dark table-striped align-middle mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Device ID</th>
              <th>Latitude</th>
              <th>Longitude</th>
              <th>Members</th>
              <th>Summary</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Timestamp</th>
              <th>Handled</th>
              <th>Action Taken</th>
            </tr>
          </thead>
          <tbody id="sosTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
const markers = {}; // key = docId

//map initialization
const map = L.map("map").setView([7.8731, 80.7718], 7); // Sri Lanka

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

// Custom Icons
const redIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

const greenIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
  shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34],
  shadowSize: [41, 41]
});

const yellowIcon = L.icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

const blueIcon = L.icon({
    iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
    shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});

/* ================== FIREBASE IMPORTS ================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import {
    getFirestore,
    collection,
    onSnapshot,
    updateDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

/* ================== FIREBASE CONFIG ================== */
const firebaseConfig = {
    apiKey: "AIzaSyBzrKD4IjHiaYvpn5jgr5JcbFNyssX6aUU",
    authDomain: "floodrescue-f062a.firebaseapp.com",
    projectId: "floodrescue-f062a",
    storageBucket: "floodrescue-f062a.firebasestorage.app",
    messagingSenderId: "143056819050",
    appId: "1:143056819050:web:ac7be693be8306d41ecb13"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================== TABLE LOGIC ================== */
let ind = 0;
const tbody = document.getElementById("sosTableBody");

// Function to get severity badge HTML
function getSeverityBadge(severity){
    let color="secondary";

    if(severity==="Critical") color="danger";
    else if(severity==="High") color="warning";
    else if(severity==="Moderate") color="info";
    else if(severity==="Low") color="success";

    return `<span class="badge bg-${color}">${severity}</span>`;
}


function AddItemToTable(
    docId, deviceId, latitude, longitude, members, summary,
    status, timestamp, handled=false, actionTaken="Not Assigned", severity="Unknown"
)
 {
    const trow = document.createElement("tr");
    const td = Array.from({length:11},()=>document.createElement("td"));

    td[0].textContent = ++ind;
    td[1].textContent = deviceId;
    td[2].textContent = latitude;
    td[3].textContent = longitude;
    td[4].textContent = members;
    td[5].textContent = summary || 'Processing...';
    td[6].innerHTML = getSeverityBadge(severity);
    td[7].textContent = status;
    td[8].textContent = timestamp?.toDate().toLocaleString() || "";

    // Handled toggle
    const handledDiv = document.createElement("div");
    handledDiv.className = "form-check form-switch";
    const handledInput = document.createElement("input");
    handledInput.type = "checkbox";
    handledInput.className = "form-check-input";
    handledInput.checked = handled;
    handledInput.onchange = async ()=> {
        await updateDoc(doc(db,"C1",docId),{handled: handledInput.checked});
    };
    handledDiv.appendChild(handledInput);
    td[9].appendChild(handledDiv);

    // Action taken
    const actionSelect = document.createElement("select");
    actionSelect.className = "form-select form-select-sm mb-1";
    const actions = ["Not Assigned","Rescue Team Dispatched","Police Notified","Medical Assistance","Evacuation Completed","Other"];
    actions.forEach(a=>{
        const opt=document.createElement("option"); opt.value=a; opt.textContent=a; actionSelect.appendChild(opt);
    });
    const otherInput = document.createElement("input");
    otherInput.type="text"; otherInput.className="form-control form-control-sm d-none"; otherInput.placeholder="Specify action...";
    if(actionTaken && !actions.includes(actionTaken)){ actionSelect.value="Other"; otherInput.value=actionTaken; otherInput.classList.remove("d-none"); }
    actionSelect.value=actions.includes(actionTaken)?actionTaken:"Other";
    actionSelect.onchange=async ()=>{
        otherInput.classList.toggle("d-none", actionSelect.value!=="Other");
        if(actionSelect.value!=="Other") await updateDoc(doc(db,"C1",docId),{actionTaken: actionSelect.value});
    };
    otherInput.onblur=async ()=>{ if(otherInput.value.trim()) await updateDoc(doc(db,"C1",docId),{actionTaken: otherInput.value}); }

    td[10].appendChild(actionSelect);
    td[10].appendChild(otherInput);

    trow.append(...td);
    tbody.appendChild(trow);
}

/* ================== REALTIME FIRESTORE ================== */
function GetAllDataRealTime() {
    const colRef = collection(db,"C1");
    onSnapshot(colRef,(querySnapshot)=>{
        ind=0; tbody.innerHTML="";
        let total=0, handledCount=0;
        const docs = [];

        querySnapshot.forEach(docSnap=>{
            docs.push({ id: docSnap.id, ...docSnap.data() });
        });
        docs.sort((a,b)=>{
            if(a.handled !== b.handled){
                return a.handled ? 1 : -1;
            }
            const order = {
                Critical:1,
                High:2,
                Moderate:3,
                Low:4,
                Unknown:5
            };
            return (order[a.severity]||6) - (order[b.severity]||6);
        });


        // querySnapshot.forEach(docSnap=>{
        //     const d=docSnap.data();
        //     AddItemToTable(docSnap.id,d.deviceId,d.latitude,d.longitude,d.members,d.message,d.severity,d.status,d.timestamp,d.handled,d.actionTaken);
        //     addOrUpdateMarker(docSnap.id,d);
        //     total++; if(d.handled) handledCount++;
        // });

        ind = 0;
        tbody.innerHTML = "";

        docs.forEach(d=>{
            AddItemToTable(
                d.id,
                d.deviceId,
                d.latitude,
                d.longitude,
                d.members,
                d.summary,
                d.status,
                d.timestamp,
                d.handled,
                d.actionTaken,
                d.severity
            );

            addOrUpdateMarker(d.id,d);

            total++;
            if(d.handled) handledCount++;
        });


        document.getElementById("totalSOS").textContent=total;
        document.getElementById("handledSOS").textContent=handledCount;
        document.getElementById("pendingSOS").textContent=total-handledCount;
    });
}

/* ================== MAP MARKERS UPDATE ================== */
function addOrUpdateMarker(docId,data){
  const { latitude, longitude, deviceId, members, summary, handled, severity } = data;
  if(!latitude||!longitude)return;
  const popupContent=`<b>Device:</b>${deviceId}<br><b>Members:</b>${members}<br><b>Summary:</b>${summary}<br><b>Severity:</b>${severity||"Unknown"}<br><b>Handled:</b>${handled?"✅ Yes":"❌ No"}`;
  //const icon = handled?greenIcon:redIcon;
  let icon;
  if(handled){
      icon = greenIcon;
  }
  else{
      if(severity === "Critical") icon = redIcon;
      else if(severity === "High") icon = redIcon;
      else if(severity === "Moderate") icon = yellowIcon;
      else if(severity === "Low") icon = blueIcon;
      else icon = redIcon;
  }


  if(markers[docId]){
    markers[docId].setLatLng([latitude,longitude]);
    markers[docId].setPopupContent(popupContent);
    markers[docId].setIcon(icon);
  } else {
    const marker = L.marker([latitude,longitude],{icon}).addTo(map).bindPopup(popupContent);
    marker.on("mouseover",()=>marker.openPopup());
    marker.on("mouseout",()=>marker.closePopup());
    markers[docId]=marker;
  }
}

window.onload = GetAllDataRealTime;
</script>
</body>
</html>
